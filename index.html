<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>%VITE_APP_NAME%</title>
    <meta name="title" content="%VITE_APP_NAME%" />
    <meta name="description" content="Personal portfolio showcasing projects, skills, and professional work." />
    <meta name="author" content="%VITE_APP_AUTHOR%" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_APP_NAME%" />
    <meta property="og:title" content="%VITE_APP_NAME%" />
    <meta property="og:description" content="Personal portfolio showcasing projects, skills, and professional work." />
    <meta property="og:image" content="%VITE_OG_IMAGE_URL%" />
    <meta property="og:image:secure_url" content="%VITE_OG_IMAGE_URL%" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portfolio" />
    <meta property="og:url" content="%VITE_SITE_URL%" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_APP_NAME%" />
    <meta name="twitter:description" content="Personal portfolio showcasing projects, skills, and professional work." />
    <meta name="twitter:image" content="%VITE_OG_IMAGE_URL%" />
    <meta name="twitter:image:alt" content="Portfolio" />

    <!-- Preconnect to Supabase for faster API calls -->
    <link rel="preconnect" href="%VITE_SUPABASE_URL%" crossorigin />
    <link rel="dns-prefetch" href="%VITE_SUPABASE_URL%" />

    <!-- Favicon / App Icon -->
    <link rel="icon" type="image/png" href="/protect.png" />
    <link rel="apple-touch-icon" href="/protect.png" />

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
